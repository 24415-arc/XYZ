<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizMind AI - 가상 이사회 </title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --primary: #2563eb; --bg: #f3f4f6; --card: #ffffff; 
            --cfo: #dc2626; --cmo: #d97706; --coo: #059669; --chro: #7c3aed;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1f2937; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 12px; }
        .input-group label { font-weight: bold; margin-bottom: 6px; font-size: 0.9em; color: #4b5563; }
        input, textarea { padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1em; }
        
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        
        .dropzone { border: 2px dashed var(--primary); background: #f8fafc; padding: 20px; border-radius: 10px; text-align: center; color: var(--primary); font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: background 0.2s; }
        .dropzone:hover { background: #eff6ff; }

        .board-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(48%, 1fr)); gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .board-grid { grid-template-columns: 1fr; } }
        
        .board-card { padding: 20px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border-top: 5px solid #dfdfdf; font-size: 0.95em; white-space: pre-wrap; line-height: 1.6; }
        .board-card.cfo { border-color: var(--cfo); }
        .board-card.cmo { border-color: var(--cmo); }
        .board-card.coo { border-color: var(--coo); }
        .board-card.chro { border-color: var(--chro); }
        
        #appSection { display: none; }
        .history-list { list-style: none; padding: 0; max-height: 350px; overflow-y: auto; }
        .history-item { background: #eff6ff; padding: 12px; margin-bottom: 8px; border-radius: 8px; font-size: 0.85em; cursor: pointer; border-left: 3px solid var(--primary); transition: background 0.2s; }
        .history-item:hover { background: #dbeafe; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--primary); margin-bottom: 5px;">💼 BizMind AI : 인공지능 가상 이사회</h1>
    </header>

    <div class="card" id="authSection" style="max-width: 450px; margin: 0 auto;">
        <h3>🔐 로그인 및 회원가입</h3>
        <div class="input-group">
            <label>이메일</label>
            <input type="email" id="emailInput" placeholder="example@email.com">
        </div>
        <div class="input-group">
            <label>비밀번호</label>
            <input type="password" id="pwInput" placeholder="6자리 이상 입력">
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="loginBtn">로그인</button>
            <button id="signupBtn" style="background: #10b981;">회원가입</button>
        </div>
    </div>

    <div id="appSection">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center; background: #f9fafb;">
            <span id="userInfo" style="font-weight: bold; color: var(--primary);"></span>
            <button id="logoutBtn" style="width: auto; margin-top: 0; background: #ef4444; padding: 8px 15px;">로그아웃</button>
        </div>

        <div style="display: grid; grid-template-columns: 2.3fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div class="card" style="margin-bottom: 0;">
                <h3>📊 실시간 매장 경영 정보 입력</h3>
                
                <div class="dropzone" id="dropzone">
                    📂 여기에 재무제표 파일(CSV)을 드래그하거나 클릭하여 업로드하세요.
                    <input type="file" id="fileInput" accept=".csv" style="display: none;">
                </div>

                <div class="grid-inputs">
                    <div class="input-group"><label>매출액 (월/원)</label><input type="number" id="revenue" placeholder="예: 15000000"></div>
                    <div class="input-group"><label>영업비용 (월/원)</label><input type="number" id="expenses" placeholder="예: 12000000"></div>
                    <div class="input-group"><label>총 자산 (원)</label><input type="number" id="assets" placeholder="예: 80000000"></div>
                    <div class="input-group"><label>총 부채/대출 (원)</label><input type="number" id="liabilities" placeholder="예: 30000000"></div>
                </div>
                <div class="input-group" style="margin-top: 10px;">
                    <label>현재 직면한 핵심 경영 안건 및 고민</label>
                    <textarea id="note" rows="3" placeholder="현재 매장이 직면한 핵심 안건을 입력하세요."></textarea>
                </div>
                <button id="analyzeBtn">🚀 가상 이사회 소집 및 클라우드 저장</button>
            </div>

            <div class="card" style="margin-bottom: 0;">
                <h3>📂 진단 기록 (Realtime DB)</h3>
                <ul class="history-list" id="historyList"></ul>
            </div>
        </div>

        <div id="loading" style="display: none; text-align: center; margin: 30px 0; font-weight: bold; color: var(--primary);">
            ⏳ CFO, CMO, COO, CHRO가 구글 보안 서버 내부에서 분석 중입니다...
        </div>

        <div id="resultSection" style="display: none;">
            <h2 style="text-align: center; color: #1e3a8a; margin-top: 40px;">📋 가상 이사회 복합 분석 보고서</h2>
            
            <div class="board-grid">
                <div class="board-card cfo" id="resCFO"></div>
                <div class="board-card cmo" id="resCMO"></div>
                <div class="board-card coo" id="resCOO"></div>
                <div class="board-card chro" id="resCHRO"></div>
            </div>
            
            <div class="card" style="margin-top: 30px; text-align: center; background: #f0fdf4; border: 1px solid #bbf7d0;">
                <h3>🎧 4대 임원 종합 의견 오디오 브리핑</h3>
                <button id="ttsBtn" style="background: #10b981; width: auto; min-width: 250px; padding: 14px;">🔊 종합 브리핑 음성 파일 생성</button>
                <div id="audioPlayer" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 파이어베이스 RTDB 설정
    const firebaseConfig = {
        apiKey: "AIzaSyAOwxt7f8_J5ZNxpNZ5R8jkD0bDjsahvek",
        authDomain: "test-2bc53.firebaseapp.com",
        databaseURL: "https://test-2bc53-default-rtdb.firebaseio.com", 
        projectId: "test-2bc53",
        storageBucket: "test-2bc53.appspot.com",
        messagingSenderId: "153078496505", 
        appId: "1:153078496505:web:7892a2428453934cc2f628"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app); 

    // 사장님의 GAS 백엔드 주소
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxghtFqZvbE99KY6tLGhaUot8_tP068sR4sRUqn-4KCqsWpY-5uRc1dmkK4zau1VM1R/exec";
    
    let currentUser = null;
    let globalAudioText = ""; 

    // CSV/엑셀 파서 로직
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.background = "#dbeafe"; });
    dropzone.addEventListener('dragleave', () => dropzone.style.background = "#f8fafc");
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.style.background = "#f8fafc";
        if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            json.forEach(row => {
                if(!row[0] || !row[1]) return;
                const key = row[0].toString().replace(/\s+/g, "");
                const val = Number(row[1].toString().replace(/[^0-9.-]/g, ""));
                if(key.includes("매출")) document.getElementById('revenue').value = val;
                if(key.includes("비용") || key.includes("지출") || key.includes("원가")) document.getElementById('expenses').value = val;
                if(key.includes("자산")) document.getElementById('assets').value = val;
                if(key.includes("부채") || key.includes("대출")) document.getElementById('liabilities').value = val;
            });
            alert(`🎉 [${file.name}] 데이터 바인딩 성공!`);
        };
        reader.readAsArrayBuffer(file);
    }

    // 로그인 및 회원가입 제어
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('userInfo').innerText = `👤 계정: ${user.email}`;
            loadHistory(); 
        } else {
            currentUser = null;
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('appSection').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('pwInput').value); } catch (e) { alert("로그인 실패: " + e.message); }
    });
    document.getElementById('signupBtn').addEventListener('click', async () => {
        try { await createUserWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('pwInput').value); alert("회원가입 완료!"); } catch (e) { alert("가입 실패: " + e.message); }
    });
    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

    // 이사회 분석 실행
    document.getElementById('analyzeBtn').addEventListener('click', async () => {
        const rev = Number(document.getElementById('revenue').value || 0);
        const exp = Number(document.getElementById('expenses').value || 0);
        const ast = Number(document.getElementById('assets').value || 0);
        const lia = Number(document.getElementById('liabilities').value || 0);
        const note = document.getElementById('note').value;

        if(!rev && !exp) return alert("매출액 또는 영업비용을 입력해 주세요.");

        const margin = rev === 0 ? 0 : (((rev - exp) / rev) * 100).toFixed(2);
        const debt = ast === 0 ? 0 : ((lia / ast) * 100).toFixed(2);

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultSection').style.display = 'none';

        try {
            // 프롬프트 없이 숫자(데이터)만 백엔드로 보냄!
            const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ rev, exp, ast, lia, margin, debt, note })
            });
            
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            // GAS가 병렬로 가져온 4개의 결과 뿌리기
            document.getElementById('resCFO').innerText = data.cfo;
            document.getElementById('resCMO').innerText = data.cmo;
            document.getElementById('resCOO').innerText = data.coo;
            document.getElementById('resCHRO').innerText = data.chro;

            globalAudioText = `이사회 종합 브리핑입니다. CFO 의견. ${data.cfo} CMO 의견. ${data.cmo} COO 의견. ${data.coo} CHRO 의견. ${data.chro}`;
            document.getElementById('resultSection').style.display = 'block';

            await saveDataToRTDB(rev, exp, ast, lia, margin, debt, note);

        } catch (error) {
            alert("회의 실패: " + error.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    });

    // 리얼타임 데이터베이스 (RTDB) 저장
    async function saveDataToRTDB(rev, exp, ast, lia, margin, debt, note) {
        if (!currentUser) return;
        try {
            const userRef = ref(db, 'board_reports/' + currentUser.uid);
            await push(userRef, {
                revenue: rev, expenses: exp, assets: ast, liabilities: lia,
                profitMargin: margin, debtRatio: debt, topic: note,
                timestamp: Date.now() 
            });
            loadHistory(); 
        } catch (e) { console.error("RTDB 저장 실패:", e); }
    }

    // 리얼타임 데이터베이스 (RTDB) 로드
    async function loadHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = "";
        if (!currentUser) return;
        try {
            const userRef = ref(db, 'board_reports/' + currentUser.uid);
            const snapshot = await get(userRef);
            
            let itemsArray = [];
            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    itemsArray.push({ id: childSnapshot.key, ...childSnapshot.val() });
                });
            }

            itemsArray.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            itemsArray.forEach((data) => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerText = `📈 이익률 ${data.profitMargin}% / 부채 ${data.debtRatio}%\n[안건]: ${(data.topic || "").substring(0,15)}...`;
                
                li.onclick = () => {
                    document.getElementById('revenue').value = data.revenue !== undefined ? data.revenue : "";
                    document.getElementById('expenses').value = data.expenses !== undefined ? data.expenses : "";
                    document.getElementById('assets').value = data.assets !== undefined ? data.assets : "";
                    document.getElementById('liabilities').value = data.liabilities !== undefined ? data.liabilities : "";
                    document.getElementById('note').value = data.topic || "";
                };
                list.appendChild(li);
            });
        } catch (e) { 
            console.error("RTDB 읽기 실패:", e); 
        }
    }

    // TTS 오디오 브리핑 엔진
    document.getElementById('ttsBtn').addEventListener('click', async () => {
        const btn = document.getElementById('ttsBtn');
        if(!globalAudioText) return alert("분석 결과가 비어있습니다.");
        btn.innerText = "⏳ 백엔드 오디오 파일 생성 중...";
        btn.disabled = true;

        try {
            const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ 
                    type: 'tts', 
                    text: globalAudioText.substring(0, 3500),
                    model: 'tts-1',
                    voice: 'alloy' 
                })
            });
            
            const data = await response.json();
            if(data.error) throw new Error(data.error);

            // Base64를 MP3로 변환
            const binaryString = atob(data.audioBase64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) { bytes[i] = binaryString.charCodeAt(i); }
            
            const blob = new Blob([bytes], { type: 'audio/mpeg' });
            const audioUrl = URL.createObjectURL(blob);
            
            document.getElementById('audioPlayer').innerHTML = `
                <audio controls autoplay style="width: 100%; max-width: 500px;"><source src="${audioUrl}" type="audio/mpeg"></audio>
                <div style="margin-top:10px;"><a href="${audioUrl}" download="이사회_브리핑.mp3" style="font-size:0.9em; font-weight:bold; color:var(--primary); text-decoration:none;">💾 MP3 다운로드</a></div>
            `;
        } catch (error) {
            alert("TTS 실패: " + error.message);
        } finally {
            btn.innerText = "🔊 종합 브리핑 음성 파일 생성";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>

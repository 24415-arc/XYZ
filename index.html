<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>BizMind 인공지능 가상 이사회 </title>
  <style>
    body { font-family: 'Arial', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #2c3e50; }
    
    .auth-box { text-align: center; margin-bottom: 20px; padding: 15px; background: #eef2f7; border-radius: 8px; }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
    .btn-google { background-color: #4285F4; color: white; }
    .btn-send { background-color: #1abc9c; color: white; width: 100px; }
    .btn-speaker { background-color: #e74c3c; color: white; margin-left: 10px; padding: 5px 10px; font-size: 12px; }
    
    .executive-selector { display: flex; gap: 10px; justify-content: space-between; margin: 20px 0; }
    .exec-card { flex: 1; padding: 15px 5px; border: 2px solid #bdc3c7; border-radius: 8px; cursor: pointer; text-align: center; transition: 0.3s; background: white; }
    .exec-card.active { border-color: #3498db; background-color: #ebf5fb; box-shadow: 0 2px 8px rgba(52,152,219,0.3); }
    .exec-card h4 { margin: 5px 0; color: #2c3e50; font-size: 16px; }
    .exec-card p { margin: 0; font-size: 12px; color: #7f8c8d; line-height: 1.4; }
    
    .chat-box { border: 1px solid #ddd; height: 350px; overflow-y: auto; padding: 15px; background: #fafafa; border-radius: 8px; margin-bottom: 15px; }
    .msg { margin-bottom: 15px; padding: 12px; border-radius: 8px; max-width: 80%; line-height: 1.5; font-size: 14px; }
    .msg.user { background: #dfece6; margin-left: auto; text-align: right; border-bottom-right-radius: 0; }
    .msg.bot { background: #ffffff; border: 1px solid #e0e0e0; margin-right: auto; border-bottom-left-radius: 0; }
    
    .input-group { display: flex; gap: 10px; }
    .input-group input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; }
    
    #main-app { display: none; }
  </style>
</head>
<body>

<div class="container">
  <h1>👔 BizMind 4인 가상 이사회</h1>

  <div class="auth-box">
    <div id="login-status" style="margin-bottom: 10px; font-weight: bold; color: #34495e;">서비스를 이용하려면 로그인이 필요합니다.</div>
    <button id="btn-login" class="btn btn-google" onclick="googleLogin()">구글 계정으로 로그인</button>
    <button id="btn-logout" class="btn" style="display:none; background:#95a5a6; color:white;" onclick="googleLogout()">로그아웃</button>
  </div>

  <div id="main-app">
    <h3 style="color: #34495e; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px;">📣 자문받을 임원을 선택하세요</h3>
    
    <div class="executive-selector">
      <div class="exec-card" onclick="selectExecutive('CEO', '철저한 사업성 중심의 냉철한 최고경영자')">
        <h4>CEO</h4>
        <p>사업성 분석<br>경영/전략 총괄</p>
      </div>
      <div class="exec-card" onclick="selectExecutive('CFO', '보수적이고 꼼꼼하게 자금을 체크하는 최고재무책임자')">
        <h4>CFO</h4>
        <p>재무/회계<br>투자 리스크 검토</p>
      </div>
      <div class="exec-card" onclick="selectExecutive('CMO', '트렌디하고 파괴적인 마케팅 전략을 제시하는 최고마케팅책임자')">
        <h4>CMO</h4>
        <p>마케팅/홍보<br>시장 확장 전략</p>
      </div>
      <div class="exec-card" onclick="selectExecutive('CTO', '최신 IT 기술 동향과 실현 가능성을 따지는 최고기술책임자')">
        <h4>CTO</h4>
        <p>IT 기술/개발<br>시스템 아키텍처</p>
      </div>
    </div>

    <div class="chat-box" id="chat-container">
      <div class="msg bot"><strong>[시스템]</strong> 상단에서 자문을 원하시는 임원을 먼저 선택해 주십시오.</div>
    </div>

    <div class="input-group">
      <input type="text" id="user-question" placeholder="질문을 입력하세요..." onkeypress="if(event.keyCode==13) sendQuestion()">
      <button class="btn btn-send" onclick="sendQuestion()">질문하기</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "test-2bc53", // 사장님이 주신 진짜 키가 들어가 있는 곳
    authDomain: "test-2bc53.firebaseapp.com",
    databaseURL: "https://test-2bc53-default-rtdb.firebaseio.com",
    projectId: "test-2bc53",
    storageBucket: "test-2bc53.firebasestorage.app",
    messagingSenderId: "153078496505",
    appId: "1:153078496505:web:7892a2428453934cc2f628"
  };
  
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const database = firebase.database();

  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyP7McdvgSahF9RWZ56r66pF3goKhFD34yZ_O4X9yxvzYu1tiNzGN9n_xJkNJv9mpz4/exec";

  // 🚨 쓰레기 하드코딩 값 제거. 초기 상태는 아무도 선택되지 않음(null)
  let selectedRole = null;
  let selectedPersona = null;

  auth.onAuthStateChanged((user) => {
    if (user) {
      document.getElementById("login-status").innerText = "🔑 " + user.displayName + " 로그인 중";
      document.getElementById("btn-login").style.display = "none";
      document.getElementById("btn-logout").style.display = "inline-block";
      document.getElementById("main-app").style.display = "block"; 
    } else {
      document.getElementById("login-status").innerText = "서비스를 이용하려면 로그인이 필요합니다.";
      document.getElementById("btn-login").style.display = "inline-block";
      document.getElementById("btn-logout").style.display = "none";
      document.getElementById("main-app").style.display = "none";  
    }
  });

  function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => alert("로그인 실패: " + err.message));
  }

  function googleLogout() {
    auth.signOut();
  }

  function selectExecutive(role, persona) {
    selectedRole = role;
    selectedPersona = persona;
    
    const cards = document.querySelectorAll('.exec-card');
    cards.forEach(card => card.classList.remove('active'));
    event.currentTarget.classList.add('active');
    
    appendMessage("bot", `[알림] 대화 상대가 <strong>${role}</strong>(으)로 변경되었습니다.`);
  }

  function appendMessage(sender, text) {
    const container = document.getElementById("chat-container");
    const msgDiv = document.createElement("div");
    msgDiv.classList.add("msg", sender);
    
    if(sender === 'bot') {
      if(text.indexOf("[알림]") !== -1 || text.indexOf("[시스템]") !== -1) {
        msgDiv.innerHTML = text; 
      } else {
        msgDiv.innerHTML = `<strong>[${selectedRole}]</strong> ${text}`;
        
        const speakBtn = document.createElement("button");
        speakBtn.className = "btn btn-speaker";
        speakBtn.innerText = "🔊 듣기";
        speakBtn.onclick = () => requestTTS(text);
        msgDiv.appendChild(speakBtn);
      }
    } else {
      msgDiv.innerText = text;
    }
    
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  }

  async function sendQuestion() {
    // 🚨 임원을 선택하지 않으면 질문 차단
    if (!selectedRole || !selectedPersona) {
      alert("질문하기 전, 자문받을 임원을 먼저 선택해 주십시오.");
      return;
    }

    const input = document.getElementById("user-question");
    const questionText = input.value.trim();

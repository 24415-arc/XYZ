<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizMind AI - 가상 이사회 </title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #2563eb; --bg: #f3f4f6; --card: #ffffff; 
            --cfo: #dc2626; --cmo: #d97706; --coo: #059669; --chro: #7c3aed;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1f2937; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 12px; }
        .input-group label { font-weight: bold; margin-bottom: 6px; font-size: 0.9em; color: #4b5563; }
        input, textarea { padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1em; }
        
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        
        /* 파일 드롭존 스타일 */
        .dropzone { border: 2px dashed var(--primary); background: #f8fafc; padding: 20px; border-radius: 10px; text-align: center; color: var(--primary); font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: background 0.2s; }
        .dropzone:hover { background: #eff6ff; }

        .board-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(48%, 1fr)); gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .board-grid { grid-template-columns: 1fr; } }
        
        .board-card { padding: 20px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border-top: 5px solid #dfdfdf; font-size: 0.95em; white-space: pre-wrap; line-height: 1.6; }
        .board-card.cfo { border-color: var(--cfo); }
        .board-card.cmo { border-color: var(--cmo); }
        .board-card.coo { border-color: var(--coo); }
        .board-card.chro { border-color: var(--chro); }
        
        #appSection { display: none; }
        .history-list { list-style: none; padding: 0; max-height: 320px; overflow-y: auto; }
        .history-item { background: #eff6ff; padding: 12px; margin-bottom: 8px; border-radius: 8px; font-size: 0.85em; cursor: pointer; border-left: 3px solid var(--primary); }
        .history-item:hover { background: #dbeafe; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--primary); margin-bottom: 5px;">💼 BizMind AI : 인공지능 가상 이사회</h1>
        <p style="color: #6b7280; margin-top: 0;">Auth + DB + GAS 백엔드 통합 대시보드 </p>
    </header>

    <div class="card" id="authSection" style="max-width: 450px; margin: 0 auto;">
        <h3>🔐 로그인 및 회원가입</h3>
        <div class="input-group">
            <label>이메일</label>
            <input type="email" id="emailInput" placeholder="example@email.com">
        </div>
        <div class="input-group">
            <label>비밀번호</label>
            <input type="password" id="pwInput" placeholder="6자리 이상 입력">
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="loginBtn">로그인</button>
            <button id="signupBtn" style="background: #10b981;">회원가입</button>
        </div>
    </div>

    <div id="appSection">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center; background: #f9fafb;">
            <span id="userInfo" style="font-weight: bold; color: var(--primary);"></span>
            <button id="logoutBtn" style="width: auto; margin-top: 0; background: #ef4444; padding: 8px 15px;">로그아웃</button>
        </div>

        <div style="display: grid; grid-template-columns: 2.5fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div class="card" style="margin-bottom: 0;">
                <h3>📊 실시간 매장 경영 정보 입력</h3>
                
                <div class="dropzone" id="dropzone">
                    📂여기에 재무제표 파일(CSV)을 드래그하거나 클릭하여 업로드하세요.
                    <input type="file" id="fileInput" accept=".csv" style="display: none;">
                </div>

                <div class="grid-inputs">
                    <div class="input-group"><label>매출액 (월/원)</label><input type="number" id="revenue" placeholder="예: 15000000"></div>
                    <div class="input-group"><label>영업비용 (월/원)</label><input type="number" id="expenses" placeholder="예: 12000000"></div>
                    <div class="input-group"><label>총 자산 (원)</label><input type="number" id="assets" placeholder="예: 80000000"></div>
                    <div class="input-group"><label>총 부채/대출 (원)</label><input type="number" id="liabilities" placeholder="예: 30000000"></div>
                </div>
                <div class="input-group" style="margin-top: 10px;">
                    <label>현재 직면한 핵심 경영 안건 및 고민</label>
                    <textarea id="note" rows="3" placeholder="현재 매장이 직면한 핵심 경영 안건 및 고민을 입력해 주세요. (예: 배달 대행료 부담 증가 대응 방안, 홀 이벤트 기획 등)"></textarea>
                </div>
                <button id="analyzeBtn">🚀 가상 이사회 소집 (GAS 안전 호출)</button>
            </div>

            <div class="card" style="margin-bottom: 0;">
                <h3>📂 진단 기록 (클라우드 DB)</h3>
                <p style="font-size: 0.8em; color: #9ca3af; margin-top: -10px;">클릭 시 과거 입력 데이터 복원</p>
                <ul class="history-list" id="historyList"></ul>
            </div>
        </div>

        <div id="loading" style="display: none; text-align: center; margin: 30px 0; font-weight: bold; color: var(--primary);">
            ⏳ CFO, CMO, COO, CHRO가 안전 백엔드 내부에서 리포트를 분석 중입니다...
        </div>

        <div id="resultSection" style="display: none;">
            <h2 style="text-align: center; color: #1e3a8a; margin-top: 40px;">📋 가상 이사회 최고경영진 복합 분석 보고서</h2>
            
            <div class="board-grid">
                <div class="board-card cfo" id="resCFO"></div>
                <div class="board-card cmo" id="resCMO"></div>
                <div class="board-card coo" id="resCOO"></div>
                <div class="board-card chro" id="resCHRO"></div>
            </div>
            
            <div class="card" style="margin-top: 30px; text-align: center; background: #f0fdf4; border: 1px solid #bbf7d0;">
                <h3>🎧 4대 임원 종합 의견 오디오 브리핑 리포트</h3>
                <button id="ttsBtn" style="background: #10b981; width: auto; min-width: 250px; padding: 14px;">🔊 브리핑 음성 파일 생성 (백엔드 TTS)</button>
                <div id="audioPlayer" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // 💡 [수정됨] where가 추가되었습니다.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔴 사장님의 실제 Firebase 프로젝트 정보가 정확하게 설정되어 있습니다.
    const firebaseConfig = {
        apiKey: "AIzaSyAOwxt7f8_J5ZNxpNZ5R8jkD0bDjsahvek",
        authDomain: "test-2bc53.firebaseapp.com",
        projectId: "test-2bc53",
        storageBucket: "test-2bc53.appspot.com",
        messagingSenderId: "153078496505", 
        appId: "1:153078496505:web:7892a2428453934cc2f628"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 🔴 [필수 확인] 구글 앱스 스크립트(GAS) 배포 후 생성된 본인의 웹 앱 URL을 여기에 붙여넣으세요.
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby28k2jgZQ4ISsFYG24w5nAp5i69yGmQ03eduZfGVQQzzu-SoQ4qxtMcfGr0iWbEDmu/exec";
    
    let currentUser = null;
    let globalAudioText = ""; 

    const BOARD_SYSTEM_PROMPTS = {
        CFO: `당신은 노련한 전문 재무고문(CFO)입니다. 제공된 '확정 재무 지표'만을 근거로 비용 통제와 자금 리스크를 따지세요. 문장 서두에 "💡 [재무고문 CFO 분석 의견]"을 달고, 현금 유동성 위기 경고 및 구체적인 비용 절감 전략 2가지를 냉철하고 보수적인 톤으로 제안하세요.`,
        CMO: `당신은 공격적인 로컬 상권 마케팅 전략가(CMO)입니다. 제공된 지표를 기반으로 마케팅 예산을 확보해 매출 자체를 획기적으로 키울 돌파구를 모색하세요. 문장 서두에 "🚀 [마케팅전략 CMO 분석 의견]"을 달고, 사장님의 핵심 안건을 해결할 수 있는 트렌디한 온/오프라인 세일즈 아이디어 2가지를 열정적인 어조로 제안하세요.`,
        COO: `당신은 매장 프로세스 효율화 및 원가 최적화 전문가(COO)입니다. 매장 내부의 식자재 원가율, 배달 플랫폼 수수료 누수 등 시스템 비효율을 진단합니다. 문장 서두에 "⚙️ [운영최적화 COO 분석 의견]"을 달고, 당장 내일부터 매장에 즉시 도입 가능한 프로세스 개선 및 고정비 세이브 방안 2가지를 담백하고 직관적으로 서술하세요.`,
        CHRO: `당신은 노무 관리 및 조직 심리 전문가(CHRO)입니다. 인건비를 단순 소목성 지출이 아닌 인적 생산성 지표로 분석합니다. 문장 서두에 "🤝 [조직인사 CHRO 분석 의견]"을 달고, 현재 재무 상황에 따른 사장님의 정신적 번아웃 방지책 및 핵심 알바/직원의 이탈 방지 케어 전략 2가지를 따뜻하게 조언하세요.`
    };

    // --------------------------------------------------
    // 업로드된 CSV 파일 파싱 엔진 (SheetJS 연동)
    // --------------------------------------------------
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.background = "#dbeafe"; });
    dropzone.addEventListener('dragleave', () => dropzone.style.background = "#f8fafc");
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.style.background = "#f8fafc";
        if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});

            json.forEach(row => {
                if(!row[0] || !row[1]) return;
                const key = row[0].toString().replace(/\s+/g, "");
                const val = Number(row[1].toString().replace(/[^0-9.-]/g, ""));

                if(key.includes("매출")) document.getElementById('revenue').value = val;
                if(key.includes("비용") || key.includes("지출") || key.includes("원가")) document.getElementById('expenses').value = val;
                if(key.includes("자산")) document.getElementById('assets').value = val;
                if(key.includes("부채") || key.includes("대출")) document.getElementById('liabilities').value = val;
            });
            alert(`🎉 [${file.name}] 데이터 연동 성공!\n추출된 경영 정보가 자동 바인딩되었습니다.`);
        };
        reader.readAsArrayBuffer(file);
    }

    // --------------------------------------------------
    // Firebase Authentication (인증 제어)
    // --------------------------------------------------
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('userInfo').innerText = `👤 계정: ${user.email}`;
            loadHistory();
        } else {
            currentUser = null;
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('appSection').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('pwInput').value); } catch (e) { alert("로그인 실패: " + e.message); }
    });

    document.getElementById('signupBtn').addEventListener('click', async () => {
        try { await createUserWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('pwInput').value); alert("회원가입 완료!"); } catch (e) { alert("가입 실패: " + e.message); }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

    // --------------------------------------------------
    // GAS 우회형 4인 가상 이사회 에이전트 구동 엔진
    // --------------------------------------------------
    document.getElementById('analyzeBtn').addEventListener('click', async () => {
        const rev = Number(document.getElementById('revenue').value || 0);
        const exp = Number(document.getElementById('expenses').value || 0);
        const ast = Number(document.getElementById('assets').value || 0);
        const lia = Number(document.getElementById('liabilities').value || 0);
        const note = document.getElementById('note').value;

        if(!rev && !exp) return alert("매출액 또는 영업비용을 입력하거나 파일을 업로드해 주세요.");

        const margin = rev === 0 ? 0 : (((rev - exp) / rev) * 100).toFixed(2);
        const debt = ast === 0 ? 0 : ((lia / ast) * 100).toFixed(2);

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultSection').style.display = 'none';

        const metricsPrompt = `\n\n[시스템 확정 지표]\n- 월 매출: ${rev.toLocaleString()}원\n- 월 비용: ${exp.toLocaleString()}원\n- 자산: ${ast.toLocaleString()}원\n- 부채: ${lia.toLocaleString()}원\n- 이익률: ${margin}%\n- 부채비율: ${debt}%\n\n[안건]\n"${note}"`;

        try {
            const [cfoRes, cmoRes, cooRes, chroRes] = await Promise.all([
                callAgent(BOARD_SYSTEM_PROMPTS.CFO + metricsPrompt),
                callAgent(BOARD_SYSTEM_PROMPTS.CMO + metricsPrompt),
                callAgent(BOARD_SYSTEM_PROMPTS.COO + metricsPrompt),
                callAgent(BOARD_SYSTEM_PROMPTS.CHRO + metricsPrompt)
            ]);

            document.getElementById('resCFO').innerText = cfoRes;
            document.getElementById('resCMO').innerText = cmoRes;
            document.getElementById('resCOO').innerText = cooRes;
            document.getElementById('resCHRO').innerText = chroRes;

            globalAudioText = `이사회 브리핑입니다. CFO 의견입니다. ${cfoRes} CMO 의견입니다. ${cmoRes} COO 의견입니다. ${cooRes} CHRO 의견입니다. ${chroRes}`;
            document.getElementById('resultSection').style.display = 'block';

            await saveDataToFirestore(rev, exp, ast, lia, margin, debt, note);

        } catch (error) {
            alert("회의 도중 에러가 발생했습니다: " + error.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    });

    async function callAgent(combinedPrompt) {
        const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
            body: JSON.stringify({
                question: combinedPrompt 
            })
        });
        
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        return data.answer; 
    }

    // --------------------------------------------------
    // Firebase Firestore 데이터 관리 (CRUD)
    // --------------------------------------------------
    async function saveDataToFirestore(rev, exp, ast, lia, margin, debt, note) {
        if (!currentUser) return;
        try {
            await addDoc(collection(db, "board_reports"), {
                uid: currentUser.uid,
                revenue: rev, expenses: exp, assets: ast, liabilities: lia,
                profitMargin: margin, debtRatio: debt, topic: note,
                timestamp: serverTimestamp()
            });
            loadHistory();
        } catch (e) { console.error("Firestore 저장 실패:", e); }
    }

    async function loadHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = "";
        if (!currentUser) return;

        try {
            // 💡 [수정됨] DB에서 로그인한 사용자의 데이터만 가져오도록 where 필터링 추가
            const q = query(
                collection(db, "board_reports"), 
                where("uid", "==", currentUser.uid), 
                orderBy("timestamp", "desc")
            );
            const querySnapshot = await getDocs(q);
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerText = `📈 이익률 ${data.profitMargin}% / 부채 ${data.debtRatio}%\n[안건]: ${(data.topic || "").substring(0,18)}...`;
                
                li.onclick = () => {
                    document.getElementById('revenue').value = data.revenue || "";
                    document.getElementById('expenses').value = data.expenses || "";
                    document.getElementById('assets').value = data.assets || "";
                    document.getElementById('liabilities').value = data.liabilities || "";
                    document.getElementById('note').value = data.topic || "";
                    alert("과거 스냅샷 데이터가 로드되었습니다.");
                };
                list.appendChild(li);
            });
        } catch (e) { 
            console.error("Firestore 읽기 실패:", e); 
            // 💡 복합 인덱스 에러 안내
            if(e.message.includes('index')) {
                console.warn("⚠️ Firebase 복합 인덱스 생성이 필요합니다. F12 콘솔창의 링크를 클릭해서 인덱스를 생성해 주세요.");
            }
        }
    }

    // --------------------------------------------------
    // GAS 우회형 고속 TTS 스트리밍 복원 엔지니어링
    // --------------------------------------------------
    document.getElementById('ttsBtn').addEventListener('click', async () => {
        const btn = document.getElementById('ttsBtn');
        if(!globalAudioText) return alert("분석 결과 텍스트가 비어있습니다.");

        btn.innerText = "⏳ 백엔드 고속 음성 합성 중...";
        btn.disabled = true;

        try {
            const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    type: 'tts',
                    text: globalAudioText.substring(0, 3500) 
                })
            });

            const data = await response.json();
            if(data.error) throw new Error(data.error);

            const binaryString = atob(data.audio);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            
            const blob = new Blob([bytes], { type: 'audio/mpeg' });
            const audioUrl = URL.createObjectURL(blob);
            
            document.getElementById('audioPlayer').innerHTML = `
                <audio controls autoplay style="width: 100%; max-width: 500px;"><source src="${audioUrl}" type="audio/mpeg"></audio>
                <div style="margin-top:10px;"><a href="${audioUrl}" download="이사회_브리핑.mp3" style="font-size:0.9em; font-weight:bold; color:var(--primary); text-decoration:none;">💾 MP3 회의록 다운로드</a></div>
            `;
        } catch (error) {
            alert("TTS 변환 오류: " + error.message);
        } finally {
            btn.innerText = "🔊 브리핑 음성 파일 생성 (백엔드 TTS)";
            btn.disabled = false;
        }
    });
</script>
